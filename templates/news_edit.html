<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소식 수정 - 더하는 교회</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/admin.css?v=15">
    <style>
        body { background: #f5f5f5; font-family: inherit; }
        .edit-container { max-width: 800px; margin: 60px auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .edit-container h2 { margin-bottom: 1.5rem; font-size: 1.5rem; color: #333; border-bottom: 2px solid #eee; padding-bottom: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #555; font-size: 0.95rem; }
        .form-group input[type="text"],
        .form-group textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; font-family: inherit; box-sizing: border-box; }
        .form-group textarea { resize: vertical; min-height: 300px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #007bff; }
        .form-actions { display: flex; gap: 10px; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2>✏️ 교회소식 수정</h2>
        <form method="POST" action="/admin/news/update/{{ news.id }}" enctype="multipart/form-data">
            <div class="form-group">
                <label>제목</label>
                <input type="text" name="title" value="{{ news.title }}" required>
            </div>
            <div class="form-group">
                <label>내용</label>
                <textarea name="content">{{ news.content }}</textarea>
            </div>
            <div class="form-group">
                <label>이미지 교체 (선택, 기존 이미지 대체)</label>
                <input type="file" name="images" multiple accept="image/*">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-edit">저장</button>
                <a href="/admin" class="btn-delete" style="text-decoration:none; padding: 6px 12px;">취소</a>
            </div>
        </form>
    </div>
</body>
</html>
