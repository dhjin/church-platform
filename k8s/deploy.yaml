apiVersion: v1
kind: Namespace
metadata:
  name: church-platform
---
apiVersion: v1
kind: Secret
metadata:
  name: church-platform-pg-secret
  namespace: church-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: "ChurchPlatform2026!"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: church-platform-pg-data
  namespace: church-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-ssd
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: church-platform-postgres
  namespace: church-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: church-platform-postgres
  serviceName: church-platform-postgres
  template:
    metadata:
      labels:
        app: church-platform-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "church_platform"
        - name: POSTGRES_USER
          value: "church_platform"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: church-platform-pg-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "384Mi"
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "church_platform", "-d", "church_platform"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: pgdata
        persistentVolumeClaim:
          claimName: church-platform-pg-data
---
apiVersion: v1
kind: Service
metadata:
  name: church-platform-postgres
  namespace: church-platform
spec:
  selector:
    app: church-platform-postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: church-platform-uploads
  namespace: church-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-ssd
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: church-platform
  namespace: church-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: church-platform
  template:
    metadata:
      labels:
        app: church-platform
    spec:
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h church-platform-postgres -U church_platform -d church_platform; do
            echo "waiting for postgres..."; sleep 2;
          done
      containers:
      - name: church-platform
        image: 192.168.219.101:30500/church-platform:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://church_platform:ChurchPlatform2026!@church-platform-postgres:5432/church_platform"
        - name: PLATFORM_ADMIN_KEY
          valueFrom:
            secretKeyRef:
              name: church-platform-secret
              key: PLATFORM_ADMIN_KEY
        - name: ES_URL
          value: "http://elasticsearch.default.svc.cluster.local:9200"
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: church-platform-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: church-platform
  namespace: church-platform
spec:
  type: NodePort
  selector:
    app: church-platform
  ports:
  - port: 80
    targetPort: 8000
    nodePort: 30890
